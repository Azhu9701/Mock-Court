# Snake Skin Rust 后端 - 鸿蒙交叉编译配置
# 复制到 ~/.cargo/config.toml 以全局生效，或保留在项目内

# 鸿蒙 PC 可能的 target（需要根据实际设备架构确认）
# 华为自研芯片（鲲鹏/麒麟）→ aarch64-unknown-linux-gnu
# x86 PC → x86_64-unknown-linux-gnu

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-gnu]
linker = "x86_64-linux-gnu-gcc"

# 如果需要静态链接（避免鸿蒙上的动态库依赖问题）
[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"

[build]
# 默认 target，根据实际设备修改
# target = "aarch64-unknown-linux-gnu"
