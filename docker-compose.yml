services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    networks:
      - banner

  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v3
    restart: unless-stopped
    environment:
      - SECRET=${TINYAUTH_SECRET}
      - APP_URL=https://auth.${DOMAIN}
      - USERS=${TINYAUTH_ADMIN_USER}:${TINYAUTH_ADMIN_PASSWORD_HASH}
      - GITHUB_CLIENT_ID=${TINYAUTH_GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${TINYAUTH_GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${TINYAUTH_GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${TINYAUTH_GOOGLE_CLIENT_SECRET:-}
    networks:
      - banner

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    volumes:
      - api_data:/app/data
    environment:
      - AI_RELAY_URL=${AI_RELAY_URL}
      - OPENAI_API_KEY=${AGENT_PROXY_KEY}
      - OPENAI_MODEL=gpt-4o
      - DEEPSEEK_API_KEY=${AGENT_PROXY_KEY}
      - DEEPSEEK_MODEL=deepseek-v4-pro
      - CLAUDE_API_KEY=${AGENT_PROXY_KEY}
      - CLAUDE_MODEL=claude-opus-4-7
    networks:
      - banner

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - NEXT_PUBLIC_API_URL=https://api.${DOMAIN}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.${DOMAIN}
    networks:
      - banner

volumes:
  caddy_data:
  caddy_config:
  api_data:

networks:
  banner:
    driver: bridge
