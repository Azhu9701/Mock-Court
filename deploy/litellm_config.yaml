# ── 你的 API Keys（不要提交到 git）──

model_list:
  # 便宜主力 — DeepSeek V4
  - model_name: deepseek-v4-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: ${DEEPSEEK_API_KEY}

  # 深度备援 — Claude Opus
  - model_name: claude-opus-4-7
    litellm_params:
      model: claude/claude-opus-4-7
      api_key: ${CLAUDE_API_KEY}

# ── 通用配置 ──
general_settings:
  master_key: ${LITELLM_MASTER_KEY}    # 你自己的 API Key，应用连中转站时用这个
  database_url: "sqlite:///app/data/litellm.db"

# ── 速率限制（按 master_key 下的 user_id 区分）──
litellm_settings:
  request_timeout: 120
  set_verbose: false
  num_retries: 2
  drop_params: true

# ── 路由策略 ──
router_settings:
  routing_strategy: "usage-based"   # 谁便宜走谁
  allowed_fails: 3
  num_retries: 2
  fallbacks:
    - deepseek-v4-pro: ["claude-opus-4-7"]
