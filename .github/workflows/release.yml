# Snake Skin Windows MSI 构建

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build Rust API (release)
        run: cargo build -p api --release

      - name: Build Next.js frontend (standalone)
        run: |
          cd nextjs
          pnpm install --frozen-lockfile
          pnpm build

      - name: Prepare dist directory
        shell: pwsh
        run: |
          $dist = "dist\Snake Skin"
          New-Item -ItemType Directory -Force -Path $dist
          Copy-Item "target\release\api.exe" "$dist\Snake Skin-api.exe"
          Copy-Item "nextjs\.next\standalone" "$dist\frontend\" -Recurse -Force
          Copy-Item "nextjs\.next\static" "$dist\frontend\.next\static" -Recurse -Force
          Copy-Item "nextjs\public" "$dist\frontend\public" -Recurse -Force
          if (Test-Path "config\default.yaml") {
            Copy-Item "config\default.yaml" "$dist\config.yaml"
          }
          if (Test-Path "data\souls") {
            Copy-Item "data\souls" "$dist\data\souls" -Recurse -Force
          }
          Copy-Item "windows\start.bat" "$dist\start.bat"
          Copy-Item "windows\icon.ico" "$dist\icon.ico" -ErrorAction SilentlyContinue

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          $env:PATH = "$env:PATH;$env:USERPROFILE\.dotnet\tools"
          wix build windows\installer.wxs -ext WixToolset.UI.wixext -o dist\Snake Skin-Setup.msi -arch x64

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snake Skin-Windows-Installer
          path: dist/Snake Skin-Setup.msi
          retention-days: 30

      - name: Upload to Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Snake Skin-Setup.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: rust

      - name: Build Rust API (release)
        run: cargo build -p api --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snake Skin-macOS
          path: target/release/api
          retention-days: 30
