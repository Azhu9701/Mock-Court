services:
  # ── 反向代理 ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8088:8080"
    volumes:
      - ./deploy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - banner
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── 可选：Cloudflare Tunnel 公网暴露 ───────────────
  # 取消注释以启用（需配合 Cloudflare 账户）
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel --protocol http2 --url http://caddy:8080
  #   depends_on:
  #     - caddy
  #   networks:
  #     - banner

  # ── 本地搜索引擎（可选） ───────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8088/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-local-dev-searxng-secret-that-is-long-enough}
    volumes:
      - ./deploy/searxng-settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - banner
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Rust 后端 API ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    # host.docker.internal 在 Docker Desktop (Mac/Win) 和 Docker Engine 24+ (Linux) 均支持
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - api_data:/app/data
      - ./config:/app/config:ro
      - ./data/souls:/app/data/souls:ro
    environment:
      - WANMINFAN_SERVER_HOST=0.0.0.0
      - WANMINFAN_SERVER_PORT=3096
      - RUST_LOG=${RUST_LOG:-info}
      # CORS：Docker 中通过 Caddy 反向代理访问，来源为 localhost:8088
      - WANMINFAN_CORS_ORIGINS=http://localhost:8088
      # LM Studio 本地模型（默认通过 host.docker.internal 连接宿主机的 1234 端口）
      - LMSTUDIO_BASE_URL=${LMSTUDIO_HOST:-http://host.docker.internal:1234}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-qwen/qwen3.5-9b}
      # 云端 API（至少填一个即可）
      - AI_RELAY_URL=${AI_RELAY_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4}
      # 搜索
      - WANMINFAN_SEARXNG_URL=http://searxng:8080
      - WANMINFAN_SEARCH_ENGINE=${SEARCH_ENGINE:-searxng}
    networks:
      - banner
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3096/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Next.js 前端 ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # NEXT_PUBLIC_* 是构建时变量，必须在 build.args 中传递
        - NEXT_PUBLIC_API_URL=/api/v1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - banner
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  caddy_data:
  caddy_config:
  api_data:
  searxng_data:

networks:
  banner:
    driver: bridge
