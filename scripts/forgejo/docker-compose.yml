version: "3"

# Mac Mini (M-series) + OrbStack 部署
# 数据放在 ~/ForgejoData/，Tailscale 走原生 macOS 客户端

networks:
  forgejo-net:
    driver: bridge

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    platform: linux/arm64        # M 芯片原生
    container_name: forgejo
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__server__ROOT_URL=http://forgejo.tail:3000/
      - FORGEJO__server__SSH_DOMAIN=forgejo.tail
      - FORGEJO__server__SSH_PORT=2222
      - FORGEJO__database__DB_TYPE=sqlite3
      # 安全加固
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__security__SECRET_KEY=${SECRET_KEY}
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=true
      # 注册控制：仅管理员可创建账号
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION=false
      # 启动页政治
      - FORGEJO__other__SHOW_FOOTER_VERSION=false
      - FORGEJO__other__SHOW_FOOTER_TEMPLATE_LOAD_TIME=false
    volumes:
      - ${FORGEJO_DATA_DIR:-./data/forgejo}:/data
    ports:
      - "3000:3000"   # HTTP
      - "2222:22"     # SSH git
    networks:
      - forgejo-net
