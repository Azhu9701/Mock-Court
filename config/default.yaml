# Snake Skin Default Configuration
data_dir: "./data"
souls_dir: "./data/souls"
archive_dir: "./data/archive"
db_path: "./data/wanminfan.db"
registry_path: "./data/registry.yaml"
call_records_path: "./data/call-records.yaml"
server_host: "127.0.0.1"
server_port: 3001
nextjs_port: 3000

searxng_url: "http://127.0.0.1:8080"
# 搜索引擎: bing (默认，开箱即用) | searxng (需自部署)
search_engine: "bing"

rate_limit:
  enabled: true
  requests_per_second: 30
  burst_size: 60

# API 认证 token（也可通过环境变量 WANMINFAN_API_TOKEN 设置）
# api_token: "your-secret-token-here"

# CORS 允许的来源（默认 http://localhost:3000）
cors_origins:
  - "http://localhost:3000"
  - "http://localhost:3002"
