# 哲学/思想辩论领域配置
#
# 对应原项目的"主义主义"（ISMISM）框架。
# 适用于：思想辩论、哲学探讨、意识形态分析。

domain:
  name: "philosophy"
  icon: "🏛️"
  system_name: "万民幡"
  agent_noun: "魂"
  user_title: "幡主"
  synthesis_verb: "辩证综合"

dimensions:
  - id: "field"
    label: "场域论"
    description: "对世界基本结构的立场"
    values: ["前现代-秩序主义", "现代性-虚无主义", "后现代-断裂", "整合-穿透", "纯粹内在性"]
    weight: 1.0
  - id: "ontology"
    label: "存在论"
    description: "对存在本质的理解"
    values: ["实在论-唯物主义", "观念论-唯心主义", "生命-意志", "关系-过程"]
    weight: 1.0
  - id: "epistemology"
    label: "认识论"
    description: "如何获得知识"
    values: ["经验主义", "理性主义", "直觉/现象学", "实践-辩证"]
    weight: 0.8
  - id: "teleology"
    label: "目的论"
    description: "人的终极目的"
    values: ["秩序/和谐", "自由/解放", "创造/生成", "理解/智慧"]
    weight: 0.8

synthesis:
  template: |
    幡主提出了以下议题：
    
    {{task}}
    
    以下{{agent_count}}位魂各自给出了见解：
    
    {{#agents}}
    ## {{name}}（{{dimensions}}）
    {{output}}
    {{/agents}}
    
    碰撞检测发现：
    - 矛盾点：{{contradictions}}
    - 互补点：{{complements}}
    - 盲区：{{blindspots}}
    
    请完成辩证综合：
    1. 梳理各位魂的立场坐标与核心论证
    2. 指出立场间的张力与可能的调和路径
    3. 指出被遗漏的视角
    4. 给出幡主可进一步追问的方向

collect_intro: |
  我将帮助你召唤一位新的魂。
  请描述这位思想家的核心立场、思维方式和关注领域。
  可以用主义主义四维坐标描述，也可以用自然语言说明其思想特质。

trigger_markers:
  single: ["简单", "快速", "一句话", "定义"]
  conference: ["分析", "综合", "多角度", "全面", "辩证"]
  debate: ["辩论", "对立", "正方", "反方", "驳斥"]
  relay: ["步骤", "流程", "推进", "阶段"]
  learn: ["学习", "教我", "解释", "原理", "为什么"]
  practice: ["实践", "操作", "执行", "落实"]

memory:
  default_share: "session"
  max_turns: 15
  persist: true
